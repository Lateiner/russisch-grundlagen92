<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch: Zahlen-Memory mit Lösung</title>
    <style>
        :root {
            --primary: #3498db;
            --success: #27ae60;
            --bg: #f4f7f9;
            --text: #2c3e50;
            --card-back: #2c3e50;
            /* Farben für die Paare im Lösungsmodus */
            --pair-0: #ffadad; --pair-1: #ffd6a5; --pair-2: #fdffb6;
            --pair-3: #caffbf; --pair-4: #9bf6ff; --pair-5: #a0c4ff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 { font-size: 1.5rem; color: var(--text); margin-bottom: 15px; }

        .stats { margin-bottom: 15px; font-weight: bold; color: #666; }

        /* Memory Grid */
        .memory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            perspective: 1000px;
            margin-bottom: 20px;
        }

        .memory-card {
            aspect-ratio: 1 / 1;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 1.5s ease;
            -webkit-tap-highlight-color: transparent;
        }

        /* Umdrehen */
        .flipped { transform: rotateY(180deg); }

        /* Gefundene Paare verschwinden langsam */
        .matched {
            opacity: 0;
            pointer-events: none;
            transform: rotateY(180deg) scale(0.9);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            font-weight: bold;
            font-size: 1rem;
            padding: 5px;
            box-sizing: border-box;
            border: 2px solid var(--text);
        }

        .card-front {
            background-color: white;
            color: var(--text);
            transform: rotateY(180deg);
        }

        .card-back {
            background-color: var(--card-back);
            color: white;
            border-color: var(--card-back);
        }

        .card-back::after { content: "?"; font-size: 1.5rem; opacity: 0.3; }

        /* Lösungs-Farben */
        .sol-0 { background-color: var(--pair-0) !important; }
        .sol-1 { background-color: var(--pair-1) !important; }
        .sol-2 { background-color: var(--pair-2) !important; }
        .sol-3 { background-color: var(--pair-3) !important; }
        .sol-4 { background-color: var(--pair-4) !important; }
        .sol-5 { background-color: var(--pair-5) !important; }

        .controls { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            transition: opacity 0.2s;
        }

        .btn-reset { background: #eee; color: #333; }
        .btn-solution { background: var(--primary); color: white; }
        .btn:hover { opacity: 0.8; }

        #win-msg {
            display: none;
            background: var(--success);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (max-width: 500px) {
            .memory-grid { grid-template-columns: repeat(3, 1fr); }
            .card-face { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Memory: Ordnungszahlen</h1>
    
    <div id="win-msg">Молодцы! Alle Paare gefunden!</div>
    <div class="stats">Züge: <span id="moves">0</span></div>

    <div class="memory-grid" id="grid"></div>

    <div class="controls">
        <button class="btn btn-reset" onclick="resetGame()">Neu starten</button>
        <button class="btn btn-solution" id="sol-btn" onclick="toggleSolution()">Lösung</button>
    </div>
</div>

<script>
    const pairsData = [
        { z: "1.", w: "первый" },
        { z: "3.", w: "третий" },
        { z: "10.", w: "десятый" },
        { z: "40.", w: "сороковой" },
        { z: "90.", w: "девяностый" },
        { z: "100.", w: "сотый" }
    ];

    let cards = [];
    let flippedCards = [];
    let matchedCount = 0;
    let moves = 0;
    let isSolutionMode = false;
    let canFlip = true;

    function initGame() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        let deck = [];
        
        pairsData.forEach((p, i) => {
            deck.push({ text: p.z, id: i });
            deck.push({ text: p.w, id: i });
        });

        deck.sort(() => Math.random() - 0.5);

        deck.forEach((data) => {
            const card = document.createElement('div');
            card.className = 'memory-card';
            card.dataset.id = data.id;
            card.innerHTML = `
                <div class="card-face card-back"></div>
                <div class="card-face card-front" id="face-${data.id}">${data.text}</div>
            `;
            card.onclick = () => !isSolutionMode && flipCard(card);
            grid.appendChild(card);
            cards.push(card);
        });
    }

    function flipCard(card) {
        if (!canFlip || card.classList.contains('flipped') || card.classList.contains('matched')) return;

        card.classList.add('flipped');
        flippedCards.push(card);

        if (flippedCards.length === 2) {
            moves++;
            document.getElementById('moves').innerText = moves;
            checkMatch();
        }
    }

    function checkMatch() {
        canFlip = false;
        const [c1, c2] = flippedCards;
        const isMatch = c1.dataset.id === c2.dataset.id;

        if (isMatch) {
            matchedCount++;
            setTimeout(() => {
                c1.classList.add('matched');
                c2.classList.add('matched');
                flippedCards = [];
                canFlip = true;
                if (matchedCount === pairsData.length) {
                    document.getElementById('win-msg').style.display = 'block';
                }
            }, 600);
        } else {
            setTimeout(() => {
                c1.classList.remove('flipped');
                c2.classList.remove('flipped');
                flippedCards = [];
                canFlip = true;
            }, 1000);
        }
    }

    function toggleSolution() {
        isSolutionMode = !isSolutionMode;
        const btn = document.getElementById('sol-btn');
        
        cards.forEach(card => {
            const front = card.querySelector('.card-front');
            const pairId = card.dataset.id;

            if (isSolutionMode) {
                card.classList.add('flipped');
                card.classList.remove('matched'); // Für Lösung wieder einblenden
                card.style.opacity = "1";
                front.classList.add(`sol-${pairId}`);
                btn.innerText = "Zurück";
            } else {
                card.classList.remove('flipped');
                front.classList.remove(`sol-${pairId}`);
                // Falls es vorher schon gematcht war, wieder ausblenden
                if (card.getAttribute('data-was-matched') === 'true' || matchedCount > 0) {
                     // Bei "Zurück" wird das Spiel im aktuellen Zustand fortgesetzt
                     // Wir prüfen hier nur den echten Spielfortschritt
                }
                btn.innerText = "Lösung";
                refreshGameState();
            }
        });
    }

    function refreshGameState() {
        // Stellt den Zustand vor der Lösung wieder her
        cards.forEach(card => {
            if (!card.classList.contains('matched')) {
                card.classList.remove('flipped');
            }
        });
    }

    function resetGame() {
        moves = 0;
        matchedCount = 0;
        flippedCards = [];
        cards = [];
        isSolutionMode = false;
        canFlip = true;
        document.getElementById('moves').innerText = "0";
        document.getElementById('win-msg').style.display = 'none';
        document.getElementById('sol-btn').innerText = "Lösung";
        initGame();
    }

    initGame();
</script>

</body>
</html>
