<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch: Fahrstuhl-Simulation (10 Aufgaben)</title>
    <style>
        :root {
            --elevator-metal: #bdc3c7;
            --elevator-dark: #2c3e50;
            --display-bg: #1a1a1a;
            --display-text: #e74c3c;
            --button-gold: #f1c40f;
            --success: #27ae60;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #34495e;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .elevator-panel {
            background: linear-gradient(145deg, #ecf0f1, #bdc3c7);
            width: 100%;
            max-width: 360px;
            padding: 25px 15px;
            border-radius: 15px;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5), inset -2px -2px 5px rgba(0,0,0,0.2);
            border: 4px solid #95a5a6;
            text-align: center;
        }

        /* Fahrstuhl-Display */
        .elevator-display {
            background-color: var(--display-bg);
            color: var(--display-text);
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 25px;
            border: 3px solid #333;
            font-family: 'Courier New', Courier, monospace;
            min-height: 90px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: inset 0 0 10px #000;
        }

        .display-floor {
            font-size: 1.1rem;
            margin-bottom: 5px;
            color: #888;
            text-transform: uppercase;
        }

        .display-task {
            font-size: 1.3rem;
            font-weight: bold;
            color: #ff4d4d;
            text-shadow: 0 0 5px #ff4d4d;
        }

        /* Buttons Grid (3 Spalten für 18 Stockwerke) */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 5px;
        }

        .elevator-btn {
            background: radial-gradient(circle, #ffffff, #dcdde1);
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 3px solid #7f8c8d;
            font-size: 1.3rem;
            font-weight: bold;
            color: #2c3e50;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            transition: all 0.1s;
            box-shadow: 0 4px #7f8c8d;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .elevator-btn:active {
            box-shadow: 0 0 #7f8c8d;
            transform: translateY(4px);
        }

        .elevator-btn.active-press {
            background: var(--button-gold);
            box-shadow: 0 0 15px var(--button-gold);
            border-color: #d4ac0d;
        }

        .elevator-btn.correct-flash {
            background: var(--success);
            box-shadow: 0 0 20px var(--success);
            color: white;
            border-color: #1e8449;
        }

        .feedback-text {
            margin-top: 15px;
            font-weight: bold;
            height: 24px;
            color: var(--elevator-dark);
        }

        .instruction-german {
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-bottom: 10px;
            font-style: italic;
        }

        .progress {
            font-size: 0.8rem;
            color: #2c3e50;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .btn-restart {
            margin-top: 20px;
            padding: 10px 20px;
            background: var(--elevator-dark);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }

        @media (max-width: 400px) {
            .elevator-btn { width: 48px; height: 48px; font-size: 1.1rem; }
            .display-task { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<div class="elevator-panel">
    <div class="progress" id="progress">Aufgabe 1 / 10</div>
    <div class="instruction-german">Drücke den richtigen Knopf:</div>
    
    <div class="elevator-display">
        <div class="display-floor" id="floor-indicator">Lobby</div>
        <div class="display-task" id="target-task">На восьмой этаж!</div>
    </div>

    <div class="button-grid" id="btn-grid">
        <!-- Knöpfe 1 bis 18 werden per JS generiert -->
    </div>

    <div class="feedback-text" id="feedback"></div>
</div>

<script>
    // 10 Aufgaben mit Fokus auf verschiedene Endungen
    const tasks = [
        { floor: 8, label: "На восьмой этаж!" },
        { floor: 1, label: "На первый этаж!" },
        { floor: 3, label: "На третий этаж!" },
        { floor: 11, label: "На одиннадцатый этаж!" },
        { floor: 2, label: "На второй этаж!" },
        { floor: 18, label: "На восемнадцатый этаж!" },
        { floor: 5, label: "На пятый этаж!" },
        { floor: 10, label: "На десятый этаж!" },
        { floor: 4, label: "На четвёртый этаж!" },
        { floor: 15, label: "На пятнадцатый этаж!" }
    ];

    let currentTaskIdx = 0;
    let canClick = true;

    function initElevator() {
        const grid = document.getElementById('btn-grid');
        grid.innerHTML = '';
        
        // Wir erstellen Knöpfe von 1 bis 18
        for (let i = 1; i <= 18; i++) {
            const btn = document.createElement('div');
            btn.className = 'elevator-btn';
            btn.innerText = i;
            btn.onclick = () => handleButtonClick(i, btn);
            grid.appendChild(btn);
        }
        updateTask();
    }

    function updateTask() {
        const task = tasks[currentTaskIdx];
        document.getElementById('target-task').innerText = task.label;
        document.getElementById('progress').innerText = `Aufgabe ${currentTaskIdx + 1} / ${tasks.length}`;
        document.getElementById('feedback').innerText = "";
    }

    function handleButtonClick(floorNumber, btnElement) {
        if (!canClick) return;

        const targetFloor = tasks[currentTaskIdx].floor;
        
        // Optisches Feedback für Klick
        btnElement.classList.add('active-press');

        if (floorNumber === targetFloor) {
            canClick = false;
            btnElement.classList.add('correct-flash');
            document.getElementById('feedback').innerText = "Правильно! (Richtig)";
            document.getElementById('floor-indicator').innerText = "Этаж: " + floorNumber;
            
            setTimeout(() => {
                btnElement.classList.remove('active-press', 'correct-flash');
                nextTask();
            }, 1200);
        } else {
            document.getElementById('feedback').innerText = "Попробуйте ещё раз!";
            setTimeout(() => {
                btnElement.classList.remove('active-press');
            }, 300);
        }
    }

    function nextTask() {
        currentTaskIdx++;
        if (currentTaskIdx < tasks.length) {
            canClick = true;
            updateTask();
        } else {
            showSuccess();
        }
    }

    function showSuccess() {
        document.getElementById('target-task').innerText = "ПРИЕХАЛИ! (Angekommen)";
        document.getElementById('target-task').style.color = "#27ae60";
        document.getElementById('feedback').innerText = "Gut gemacht! Alle Etagen gefunden.";
        
        const restartBtn = document.createElement('button');
        restartBtn.className = "btn-restart";
        restartBtn.innerText = "Noch einmal spielen";
        restartBtn.onclick = () => location.reload();
        document.querySelector('.elevator-panel').appendChild(restartBtn);
    }

    // Initialisierung
    initElevator();
</script>

</body>
</html>
