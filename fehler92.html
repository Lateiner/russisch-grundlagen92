<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch: Fehlersuche (10 Aufgaben)</title>
    <style>
        :root {
            --primary: #3498db;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f5f7fa;
            --text: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            max-width: 650px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
        }

        .progress {
            color: #aaa;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        h1 {
            color: var(--text);
            font-size: 1.4rem;
            margin-bottom: 10px;
        }

        p.instruction {
            color: #666;
            margin-bottom: 30px;
            font-size: 1rem;
        }

        /* Wort-Reihe */
        .word-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .word-card {
            background: #fdfdfd;
            border: 2px solid #eaeaea;
            padding: 15px;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .word-card:hover {
            border-color: var(--primary);
            background-color: #f4f9fd;
        }

        .word-card.correct {
            background-color: var(--success) !important;
            border-color: var(--success) !important;
            color: white;
        }

        .word-card.wrong {
            background-color: var(--error) !important;
            border-color: var(--error) !important;
            color: white;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .feedback {
            height: 24px;
            font-weight: bold;
            margin-top: 15px;
        }

        #next-btn {
            display: none;
            margin-top: 20px;
            padding: 12px 30px;
            background: var(--text);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
        }

        @media (min-width: 500px) {
            .word-row {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="progress" id="progress">Aufgabe 1 von 10</div>
    <h1>Найдите лишнее слово!</h1>
    <p class="instruction">Klicke auf das Wort, das <strong>keine</strong> Ordnungszahl ist.</p>

    <div class="word-row" id="word-grid">
        <!-- Wörter werden per JS geladen -->
    </div>

    <div class="feedback" id="feedback"></div>
    <button id="next-btn" onclick="nextQuestion()">Nächste Aufgabe</button>
</div>

<script>
    const questions = [
        {
            words: ["первый", "второй", "три", "четвёртый"],
            odd: "три"
        },
        {
            words: ["десятый", "сорок", "сотый", "шестой"],
            odd: "сорок"
        },
        {
            words: ["третья", "пятое", "новый", "первые"],
            odd: "новый"
        },
        {
            words: ["седьмой", "девять", "восьмой", "второй"],
            odd: "девять"
        },
        {
            words: ["одиннадцатый", "сто", "тринадцатый", "пятый"],
            odd: "сто"
        },
        {
            words: ["миллионный", "миллиард", "тысячный", "двухсотый"],
            odd: "миллиард"
        },
        {
            words: ["второй", "восьмой", "два", "двенадцатый"],
            odd: "два"
        },
        {
            words: ["сороковой", "девяностый", "восемьдесят", "пятидесятый"],
            odd: "восемьдесят"
        },
        {
            words: ["первое", "четвёртая", "красное", "восьмое"],
            odd: "красное"
        },
        {
            words: ["пятисотый", "тысячный", "один", "двухсотый"],
            odd: "один"
        }
    ];

    let currentIdx = 0;
    let canClick = true;

    function loadQuestion() {
        canClick = true;
        const q = questions[currentIdx];
        document.getElementById('progress').innerText = `Aufgabe ${currentIdx + 1} von ${questions.length}`;
        document.getElementById('feedback').innerText = "";
        document.getElementById('next-btn').style.display = "none";
        
        const grid = document.getElementById('word-grid');
        grid.innerHTML = '';

        const shuffledWords = [...q.words].sort(() => Math.random() - 0.5);

        shuffledWords.forEach(word => {
            const card = document.createElement('div');
            card.className = 'word-card';
            card.innerText = word;
            card.onclick = () => checkAnswer(word, card);
            grid.appendChild(card);
        });
    }

    function checkAnswer(selectedWord, element) {
        if (!canClick) return;

        const correctOdd = questions[currentIdx].odd;
        const feedback = document.getElementById('feedback');

        if (selectedWord === correctOdd) {
            element.classList.add('correct');
            feedback.innerText = "Правильно!";
            feedback.style.color = "var(--success)";
            canClick = false;
            document.getElementById('next-btn').style.display = "inline-block";
        } else {
            element.classList.add('wrong');
            feedback.innerText = "Попробуйте ещё раз!";
            feedback.style.color = "var(--error)";
            setTimeout(() => element.classList.remove('wrong'), 500);
        }
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < questions.length) {
            loadQuestion();
        } else {
            showFinal();
        }
    }

    function showFinal() {
        document.querySelector('.game-container').innerHTML = `
            <h1 style="color: var(--success)">Молодцы!</h1>
            <p>Du hast alle 10 Fehlersuchen erfolgreich abgeschlossen.</p>
            <button class="word-card" style="width: auto; margin: 20px auto 0; display: block;" onclick="location.reload()">Noch einmal spielen</button>
        `;
    }

    loadQuestion();
</script>

</body>
</html>
