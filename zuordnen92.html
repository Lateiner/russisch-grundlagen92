<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch: Fall-Zuordnung Ordnungszahlen</title>
    <style>
        :root {
            --primary: #3498db;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f8f9fa;
            --text: #2c3e50;
            /* Farben für die Paare im Lösungsmodus */
            --p-0: #ffadad; --p-1: #ffd6a5; --p-2: #fdffb6;
            --p-3: #caffbf; --p-4: #9bf6ff; --p-5: #a0c4ff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .game-container {
            max-width: 800px;
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 { font-size: 1.5rem; margin-bottom: 10px; }
        .instr { color: #666; margin-bottom: 20px; font-size: 0.9rem; }

        .matching-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card {
            background: white;
            border: 2px solid #ddd;
            border-radius: 12px;
            padding: 15px 10px;
            cursor: pointer;
            transition: opacity 1.2s ease, transform 0.3s ease, background-color 0.4s ease;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 55px;
            font-weight: bold;
            font-size: 1rem;
            -webkit-tap-highlight-color: transparent;
        }

        /* Status-Klassen */
        .card.selected {
            border-color: var(--primary);
            background-color: #ebf5ff;
            transform: scale(1.03);
        }

        .card.correct {
            border-color: var(--success);
            background-color: #eafaf1;
            pointer-events: none;
        }

        .card.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .card.wrong {
            border-color: var(--error);
            background-color: #fdf2f2;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Lösungsfarben */
        .sol-0 { background-color: var(--p-0) !important; border-color: #ff8585; }
        .sol-1 { background-color: var(--p-1) !important; border-color: #ffbd6e; }
        .sol-2 { background-color: var(--p-2) !important; border-color: #e2e600; }
        .sol-3 { background-color: var(--p-3) !important; border-color: #8ce67a; }
        .sol-4 { background-color: var(--p-4) !important; border-color: #5ce9f8; }
        .sol-5 { background-color: var(--p-5) !important; border-color: #76a8ff; }

        .controls {
            margin-top: 30px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button.btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .btn-reset { background: #eee; color: #333; }
        .btn-solution { background: var(--text); color: white; }

        .feedback {
            margin-top: 15px;
            font-weight: bold;
            min-height: 1.5em;
        }

        @media (max-width: 600px) {
            .card { font-size: 0.85rem; padding: 10px 5px; min-height: 45px; }
            .matching-grid { gap: 10px; }
        }
    </style>
</head>
<body>

<div class="game-container">
    <h1>Падежи (Die Fälle)</h1>
    <p class="instr">Klicke links auf den Ausdruck und rechts auf den passenden Fall.</p>

    <div class="matching-grid">
        <div class="column" id="expression-column"></div>
        <div class="column" id="case-column"></div>
    </div>

    <div class="feedback" id="feedback"></div>

    <div class="controls">
        <button class="btn btn-reset" onclick="location.reload()">Neu starten</button>
        <button class="btn btn-solution" id="solution-btn" onclick="toggleSolution()">Lösung</button>
    </div>
</div>

<script>
    const pairs = [
        { id: 0, exp: "первого текста", caseName: "Родительный (Genitiv)" },
        { id: 1, exp: "первому дому", caseName: "Дательный (Dativ)" },
        { id: 2, exp: "первую книгу", caseName: "Винительный (Akkusativ)" },
        { id: 3, exp: "первым гостем", caseName: "Творительный (Instrumental)" },
        { id: 4, exp: "о первой главе", caseName: "Предложный (Präpositiv)" },
        { id: 5, exp: "первые задания", caseName: "Именительный (Nominativ)" }
    ];

    let selectedExpId = null;
    let matchesFound = 0;
    let isSolutionMode = false;

    function initGame() {
        const expColumn = document.getElementById('expression-column');
        const caseColumn = document.getElementById('case-column');

        const shuffledExp = [...pairs].sort(() => Math.random() - 0.5);
        const shuffledCase = [...pairs].sort(() => Math.random() - 0.5);

        shuffledExp.forEach(p => createCard(p, expColumn, 'exp'));
        shuffledCase.forEach(p => createCard(p, caseColumn, 'case'));
    }

    function createCard(pair, container, type) {
        const div = document.createElement('div');
        div.className = `card pair-id-${pair.id}`;
        div.id = `${type}-${pair.id}`;
        div.innerText = type === 'exp' ? pair.exp : pair.caseName;
        div.onclick = () => !isSolutionMode && (type === 'exp' ? selectExpression(pair.id) : selectCase(pair.id));
        container.appendChild(div);
    }

    function selectExpression(id) {
        if (document.getElementById(`exp-${id}`).classList.contains('hidden')) return;
        document.querySelectorAll('#expression-column .card').forEach(c => c.classList.remove('selected'));
        selectedExpId = id;
        document.getElementById(`exp-${id}`).classList.add('selected');
        setFeedback("Wähle nun den passenden Fall!", "var(--primary)");
    }

    function selectCase(id) {
        if (selectedExpId === null || document.getElementById(`case-${id}`).classList.contains('hidden')) return;

        const expEl = document.getElementById(`exp-${selectedExpId}`);
        const caseEl = document.getElementById(`case-${id}`);

        if (selectedExpId === id) {
            expEl.classList.remove('selected');
            expEl.classList.add('correct');
            caseEl.classList.add('correct');
            setFeedback("Правильно!", "var(--success)");
            
            setTimeout(() => {
                expEl.classList.add('hidden');
                caseEl.classList.add('hidden');
                matchesFound++;
                if (matchesFound === pairs.length) {
                    setFeedback("Молодцы! Alle Fälle richtig zugeordnet.", "var(--success)");
                }
            }, 800);
            
            selectedExpId = null;
        } else {
            caseEl.classList.add('wrong');
            setFeedback("Попробуйте ещё раз!", "var(--error)");
            setTimeout(() => caseEl.classList.remove('wrong'), 500);
        }
    }

    function toggleSolution() {
        isSolutionMode = !isSolutionMode;
        const btn = document.getElementById('solution-btn');
        
        if (isSolutionMode) {
            btn.innerText = "Zurück zum Spiel";
            setFeedback("Lösung (farblich markiert)", "#555");
            pairs.forEach(p => {
                const exp = document.getElementById(`exp-${p.id}`);
                const cs = document.getElementById(`case-${p.id}`);
                exp.classList.remove('hidden', 'selected');
                cs.classList.remove('hidden', 'selected');
                exp.classList.add(`sol-${p.id}`);
                cs.classList.add(`sol-${p.id}`);
            });
        } else {
            btn.innerText = "Lösung";
            setFeedback("", "");
            pairs.forEach(p => {
                const exp = document.getElementById(`exp-${p.id}`);
                const cs = document.getElementById(`case-${p.id}`);
                exp.classList.remove(`sol-${p.id}`);
                cs.classList.remove(`sol-${p.id}`);
                if(exp.classList.contains('correct')) {
                    exp.classList.add('hidden');
                    cs.classList.add('hidden');
                }
            });
        }
    }

    function setFeedback(text, color) {
        const fb = document.getElementById('feedback');
        fb.innerText = text;
        fb.style.color = color;
    }

    initGame();
</script>

</body>
</html>
