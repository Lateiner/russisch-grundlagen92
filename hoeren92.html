<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch Hörverstehen: 10 Ordnungszahlen</title>
    <style>
        :root {
            --primary: #3498db;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f4f7f6;
            --text: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        .play-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.4);
            transition: transform 0.2s, background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
        }

        .play-btn:active { transform: scale(0.9); }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .option-btn {
            background: white;
            border: 2px solid #ddd;
            padding: 15px;
            border-radius: 12px;
            font-size: 1.25rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text);
        }

        .option-btn.correct {
            background-color: var(--success) !important;
            border-color: var(--success) !important;
            color: white;
        }

        .option-btn.wrong {
            background-color: var(--error) !important;
            border-color: var(--error) !important;
            color: white;
            animation: shake 0.4s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .feedback {
            margin-top: 20px;
            height: 24px;
            font-weight: bold;
        }

        #next-btn {
            display: none;
            margin-top: 20px;
            padding: 12px 30px;
            background: var(--dark-blue, #2c3e50);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        @media (max-width: 400px) {
            .options-grid { grid-template-columns: 1fr; }
        }

        .progress { color: #888; font-size: 0.9rem; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="progress" id="progress">Aufgabe 1 von 10</div>
    <h1>Слушайте!</h1>
    <p>Hör zu und wähle die richtige Ziffer.</p>

    <button class="play-btn" onclick="playAudio()">▶️</button>

    <div class="options-grid" id="options"></div>

    <div class="feedback" id="feedback"></div>
    <button id="next-btn" onclick="nextQuestion()">Nächste Aufgabe</button>
</div>

<script>
    const quizData = [
        { word: "девяностый", correct: "90.", options: ["19.", "90.", "9."] },
        { word: "первый", correct: "1.", options: ["1.", "11.", "21."] },
        { word: "сороковой", correct: "40.", options: ["4.", "40.", "14."] },
        { word: "третий", correct: "3.", options: ["3.", "13.", "30."] },
        { word: "одиннадцатый", correct: "11.", options: ["1.", "11.", "12."] },
        { word: "сотый", correct: "100.", options: ["10.", "100.", "1000."] },
        { word: "пятидесятый", correct: "50.", options: ["15.", "5.", "50."] },
        { word: "седьмой", correct: "7.", options: ["6.", "7.", "8."] },
        { word: "девятнадцатый", correct: "19.", options: ["9.", "19.", "90."] },
        { word: "шестидесятый", correct: "60.", options: ["6.", "16.", "60."] }
    ];

    let currentIdx = 0;
    let canAnswer = true;
    let russianMaleVoice = null;

    function loadVoices() {
        const voices = window.speechSynthesis.getVoices();
        // Gezielte Suche nach russischen männlichen Stimmen
        russianMaleVoice = voices.find(v => v.lang.includes('ru') && 
            (v.name.includes('Maxim') || v.name.includes('Pavel') || v.name.includes('Dmitry'))) 
            || voices.find(v => v.lang.includes('ru'));
    }

    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = loadVoices;
    }
    loadVoices();

    function playAudio() {
        window.speechSynthesis.cancel(); // Stop current audio
        const msg = new SpeechSynthesisUtterance();
        msg.text = quizData[currentIdx].word;
        msg.lang = 'ru-RU';
        msg.voice = russianMaleVoice;
        msg.rate = 0.85; 
        window.speechSynthesis.speak(msg);
    }

    function initQuestion() {
        canAnswer = true;
        const q = quizData[currentIdx];
        document.getElementById('progress').innerText = `Aufgabe ${currentIdx + 1} von ${quizData.length}`;
        document.getElementById('feedback').innerText = "";
        document.getElementById('next-btn').style.display = "none";
        
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(opt, btn);
            optionsDiv.appendChild(btn);
        });
    }

    function checkAnswer(selected, btn) {
        if (!canAnswer) return;
        
        const correct = quizData[currentIdx].correct;
        const feedback = document.getElementById('feedback');

        if (selected === correct) {
            btn.classList.add('correct');
            feedback.innerText = "Правильно!";
            feedback.style.color = "var(--success)";
            canAnswer = false;
            document.getElementById('next-btn').style.display = "inline-block";
        } else {
            btn.classList.add('wrong');
            feedback.innerText = "Попробуйте ещё раз!";
            feedback.style.color = "var(--error)";
            setTimeout(() => btn.classList.remove('wrong'), 500);
        }
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < quizData.length) {
            initQuestion();
        } else {
            showFinal();
        }
    }

    function showFinal() {
        document.querySelector('.quiz-container').innerHTML = `
            <h1 style="color: var(--success)">Молодцы!</h1>
            <p>Du hast alle 10 Hörbeispiele richtig zugeordnet.</p>
            <button class="option-btn" style="width:auto; margin-top:20px;" onclick="location.reload()">Noch einmal</button>
        `;
    }

    initQuestion();
</script>

</body>
</html>
